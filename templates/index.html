<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIT Auto Registration Dashboard</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 25, 40, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.4);
            --terminal-bg: #05070c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Header Style */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .logo-section h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-section p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 9999px;
            border: 1px solid var(--card-border);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--text-secondary);
        }

        .status-dot.active {
            background-color: var(--success);
            box-shadow: 0 0 12px var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.5;
            }
        }

        /* Main Content Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 1.5rem;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards styling */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.8rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }

        /* Form Controls */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            width: 100%;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Toggles */
        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent-primary);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), #4f46e5);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            box-shadow: 0 4px 15px var(--success-glow);
            font-size: 1.05rem;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }

        .btn-test {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .btn-test:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            box-shadow: 0 4px 15px var(--danger-glow);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }

        .btn:disabled {
            background: #4b5563;
            color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Right column container */
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .action-card {
            background: rgba(17, 25, 40, 0.85);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 1rem;
        }

        /* Live Terminal styling */
        .terminal-card {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--terminal-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            min-height: 400px;
        }

        .terminal-header {
            background: #111827;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .terminal-controls {
            display: flex;
            gap: 6px;
        }

        .dot-control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red {
            background: #ef4444;
        }

        .dot-yellow {
            background: #f59e0b;
        }

        .dot-green {
            background: #10b981;
        }

        .terminal-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: bold;
        }

        .terminal-body {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 1rem;
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: #34d399;
            /* Emerald color for retro feel */
            max-height: 450px;
        }

        .terminal-line {
            line-height: 1.4;
            white-space: pre-wrap;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1f2937;
            border-left: 4px solid var(--accent-primary);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transform: translateY(150%);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <h1>UIA và tứ kỵ sĩ</h1>
                <p>Auto version of f12 tool</p>
            </div>
            <div class="status-container">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Đang tải trạng thái...</span>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Cấu hình (Cột trái) -->
            <div class="card">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    Cấu hình tham số đăng ký
                </div>

                <div class="form-group">
                    <label for="targetUrl">Đường dẫn trang đăng ký</label>
                    <input type="text" id="targetUrl" placeholder="https://dkhp.uit.edu.vn">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Tên đăng nhập</label>
                        <input type="text" id="username" placeholder="MSSV">
                    </div>
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" placeholder="••••••••">
                    </div>
                </div>

                <div class="form-group">
                    <label for="classCodes">Danh sách mã lớp (cách nhau bởi dấu phẩy hoặc dòng mới)</label>
                    <textarea id="classCodes" placeholder="SE104.O21, IT002.O22, MA004.O23"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="scanInterval">Tần suất quét (ms)</label>
                        <input type="number" id="scanInterval" min="50" step="50" placeholder="200">
                    </div>
                    <div class="form-group">
                        <label for="submitDelay">Độ trễ gửi đăng ký (ms)</label>
                        <input type="number" id="submitDelay" min="0" step="1000" placeholder="5000">
                    </div>
                </div>

                <div class="toggle-group">
                    <label for="headless">Chế độ ẩn danh (Không hiện Chrome)</label>
                    <label class="switch">
                        <input type="checkbox" id="headless">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="toggle-group">
                    <label for="autoSubmit">Tự động bấm Xác nhận đăng ký</label>
                    <label class="switch">
                        <input type="checkbox" id="autoSubmit">
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="btn btn-primary" id="saveBtn">Lưu cấu hình</button>
            </div>

            <!-- Trình theo dõi (Cột phải) -->
            <div class="right-column">
                <!-- Nút điều khiển -->
                <div class="action-card">
                    <button class="btn btn-success" id="startBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                        Bắt đầu
                    </button>
                    <button class="btn btn-test" id="testBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                        Bắt đầu (Test)
                    </button>
                    <button class="btn btn-danger" id="stopBtn" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        </svg>
                        Dừng lại
                    </button>
                </div>

                <!-- Màn hình Console Logs -->
                <div class="terminal-card">
                    <div class="terminal-header">
                        <div class="terminal-controls">
                            <span class="dot-control dot-red"></span>
                            <span class="dot-control dot-yellow"></span>
                            <span class="dot-control dot-green"></span>
                        </div>
                        <div class="terminal-title">LIVE LOG MONITOR</div>
                        <div style="width: 48px;"></div> <!-- placeholder to balance flex space -->
                    </div>
                    <div class="terminal-body" id="terminalBody">
                        <div class="terminal-line" style="color: var(--text-secondary);">[hệ thống] Sẵn sàng. Nhấn Bắt
                            đầu để theo dõi nhật ký hoạt động.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Thông báo hiển thị tại đây</div>

    <script>
        const saveBtn = document.getElementById('saveBtn');
        const startBtn = document.getElementById('startBtn');
        const testBtn = document.getElementById('testBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const terminalBody = document.getElementById('terminalBody');
        const toast = document.getElementById('toast');

        let logSource = null;

        // Hiển thị Toast thông báo
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--accent-primary)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Tải cấu hình từ API
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();

                document.getElementById('targetUrl').value = data.target_url || '';
                document.getElementById('username').value = data.username || '';
                document.getElementById('password').value = data.password || '';
                document.getElementById('classCodes').value = (data.class_codes || []).join(', ');
                document.getElementById('scanInterval').value = data.scan_interval_ms || 200;
                document.getElementById('submitDelay').value = data.submit_delay_ms || 5000;
                document.getElementById('headless').checked = !!data.headless;
                document.getElementById('autoSubmit').checked = !!data.auto_click_submit;
            } catch (err) {
                showToast('Không thể tải cấu hình!', true);
            }
        }

        // Lưu cấu hình xuống API
        saveBtn.addEventListener('click', async () => {
            const rawClassCodes = document.getElementById('classCodes').value;
            // Parse danh sách mã lớp từ dấu phẩy hoặc xuống dòng
            const classCodes = rawClassCodes.split(/[\n,]+/).map(c => c.trim()).filter(c => c);

            const config = {
                target_url: document.getElementById('targetUrl').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                class_codes: classCodes,
                scan_interval_ms: parseInt(document.getElementById('scanInterval').value) || 200,
                submit_delay_ms: parseInt(document.getElementById('submitDelay').value) || 0,
                headless: document.getElementById('headless').checked,
                auto_click_submit: document.getElementById('autoSubmit').checked
            };

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const result = await res.json();
                if (result.status === 'success') {
                    showToast('Đã lưu cấu hình thành công!');
                } else {
                    showToast(result.message || 'Lỗi lưu cấu hình', true);
                }
            } catch (err) {
                showToast('Lỗi gửi yêu cầu lưu cấu hình!', true);
            }
        });

        // Cập nhật trạng thái của tool
        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                if (data.running) {
                    statusDot.classList.add('active');
                    statusText.textContent = 'ĐANG ĐĂNG KÝ...';
                    startBtn.disabled = true;
                    testBtn.disabled = true;
                    stopBtn.disabled = false;

                    // Kết nối SSE lấy log nếu chưa kết nối
                    if (!logSource) {
                        connectLogs();
                    }
                } else {
                    statusDot.classList.remove('active');
                    statusText.textContent = 'ĐANG RẢNH';
                    startBtn.disabled = false;
                    testBtn.disabled = false;
                    stopBtn.disabled = true;

                    if (logSource) {
                        logSource.close();
                        logSource = null;
                    }
                }
            } catch (err) {
                statusText.textContent = 'Mất kết nối máy chủ';
            }
        }

        // Kết nối đến luồng log SSE
        function connectLogs() {
            if (logSource) {
                logSource.close();
            }

            terminalBody.innerHTML = '';
            logSource = new EventSource('/api/logs');

            logSource.onmessage = function (event) {
                const data = JSON.parse(event.data);
                const line = document.createElement('div');
                line.className = 'terminal-line';

                // Highlight màu cho terminal tùy theo loại log
                let msg = data.log;
                if (msg.includes('[OK]') || msg.includes('THÀNH CÔNG')) {
                    line.style.color = '#10b981'; // Green
                } else if (msg.includes('[-]')) {
                    line.style.color = '#ef4444'; // Red
                } else if (msg.includes('[i]')) {
                    line.style.color = '#38bdf8'; // Cyan
                } else if (msg.includes('[web]')) {
                    line.style.color = '#a78bfa'; // Purple
                } else {
                    line.style.color = '#e5e7eb'; // Default light gray
                }

                line.textContent = msg.replace(/\n$/, '');
                terminalBody.appendChild(line);

                // Tự động cuộn xuống dưới cùng
                terminalBody.scrollTop = terminalBody.scrollHeight;
            };

            logSource.onerror = function () {
                logSource.close();
                logSource = null;
            };
        }

        // Bắt đầu đăng ký (thật/test)
        async function startTool(test = false) {
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ test })
                });
                const data = await res.json();
                showToast(data.message, data.status === 'error');
                updateStatus();
                if (data.status === 'success') {
                    connectLogs();
                }
            } catch (err) {
                showToast('Lỗi khi gửi lệnh bắt đầu!', true);
            }
        }

        startBtn.addEventListener('click', () => startTool(false));
        testBtn.addEventListener('click', () => startTool(true));

        // Dừng đăng ký
        stopBtn.addEventListener('click', async () => {
            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                const data = await res.json();
                showToast(data.message, data.status === 'error');
                updateStatus();
            } catch (err) {
                showToast('Lỗi khi dừng công cụ!', true);
            }
        });

        // Tải cấu hình khi khởi động và theo dõi trạng thái mỗi giây
        loadConfig();
        updateStatus();
        setInterval(updateStatus, 1000);
    </script>
</body>

</html>
